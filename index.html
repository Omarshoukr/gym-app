// ─── License ──────────────────────────────────────────────────────────────────
const SECRET = "GYMSECRET2026";
function generateKey(gymName) {
  const str = (gymName.trim().toUpperCase() + SECRET).split("").reduce((h, c) => {
    h = ((h << 5) - h) + c.charCodeAt(0); return h & h;
  }, 0);
  const abs = Math.abs(str).toString(16).toUpperCase().padStart(8,"0");
  const full = (abs+abs).slice(0,12);
  return full.slice(0,4)+"-"+full.slice(4,8)+"-"+full.slice(8,12);
}
function validateKey(n,k){ return !!(n&&k&&generateKey(n)===k.trim().toUpperCase()); }


const { useState, useEffect } = React;

// ─── localStorage-backed storage polyfill (mimics window.storage API) ─────────
window.storage = {
  async get(key) {
    const raw = localStorage.getItem("gymapp_" + key);
    if (raw === null) return null;
    return { key, value: raw, shared: false };
  },
  async set(key, value) {
    localStorage.setItem("gymapp_" + key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem("gymapp_" + key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = "") {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith("gymapp_" + prefix)) keys.push(k.replace("gymapp_", ""));
    }
    return { keys, shared: false };
  }
};


// ─── Default Plans (editable) ──────────────────────────────────────────────────
const DEFAULT_PLANS = {
  "شهري":     { price: 350,  days: 30  },
  "ربع سنوي": { price: 900,  days: 90  },
  "نصف سنوي": { price: 1600, days: 180 },
  "سنوي":     { price: 2800, days: 365 },
};


// ─── Helpers ──────────────────────────────────────────────────────────────────
function daysLeft(startDate, plan, plans) {
  const start = new Date(startDate);
  const end = new Date(start);
  end.setDate(end.getDate() + (plans[plan]?.days || 30));
  const diff = Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));
  return diff;
}
function expiryDate(startDate, plan, plans) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + (plans[plan]?.days || 30));
  return d.toLocaleDateString("ar-EG");
}
function statusColor(days, paid) {
  if (!paid) return "#ef4444";
  if (days <= 0) return "#ef4444";
  if (days <= 7) return "#f97316";
  return "#22c55e";
}
function statusLabel(days, paid) {
  if (!paid) return "غير مدفوع";
  if (days <= 0) return "منتهي";
  if (days <= 7) return "قارب الانتهاء";
  return "نشط";
}
function whatsappNumber(phone) {
  let p = phone.replace(/\D/g, "");
  if (p.startsWith("0")) p = "2" + p;
  return p;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function GymApp() {
  const [licensed, setLicensed] = useState(false);
  const [licForm, setLicForm] = useState({ name:"", key:"" });
  const [licErr, setLicErr] = useState("");
  const [setupDone, setSetupDone] = useState(false);
  const [loadingSetup, setLoadingSetup] = useState(true);
  const [gymInfo, setGymInfo]     = useState({ name: "", phone: "" });
  const [setupForm, setSetupForm] = useState({ name: "", phone: "" });

  const [page, setPage]       = useState("dashboard");
  const [members, setMembers] = useState([]);
  const [trainers, setTrainers] = useState([]);
  const [expenses, setExpenses] = useState([]); // {id, name, amount, recurring, month: "YYYY-MM"}
  const [plans, setPlans]     = useState(DEFAULT_PLANS);
  const [supplements, setSupplements] = useState([]);
  const [showSupp, setShowSupp] = useState(false);
  const [suppForm, setSuppForm] = useState({ name: "", price: "" });
  const [editSupp, setEditSupp] = useState(null);
  const [search, setSearch]   = useState("");
  const [trainerSearch, setTrainerSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [showOffer, setShowOffer] = useState(false);
  const [showExpense, setShowExpense] = useState(false);
  const [showTrainer, setShowTrainer] = useState(false);
  const [toast, setToast]     = useState(null);
  const [editMember, setEditMember] = useState(null);
  const [editingOffer, setEditingOffer] = useState(null);
  const [editTrainer, setEditTrainer] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showExpiryAlert, setShowExpiryAlert] = useState(false);
  const [settingsForm, setSettingsForm] = useState({ name: "", phone: "" });

  const [trainerForm, setTrainerForm] = useState({ name: "", phone: "", specialty: "", shift: "صباحي", salary: "" });


  const [form, setForm] = useState({
    name: "", phone: "", plan: "شهري", startDate: new Date().toISOString().split("T")[0],
    paid: true, weight: "", height: ""
  });

  const [offerForm, setOfferForm] = useState({ name: "", price: "", days: "" });
  const [expenseForm, setExpenseForm] = useState({ name: "", amount: "", recurring: false });
  const [editingExpense, setEditingExpense] = useState(null);

  useEffect(() => {
    try {
      const lic = JSON.parse(localStorage.getItem("gym_lic") || "null");
      if (lic && validateKey(lic.name, lic.key)) setLicensed(true);
    } catch(e) {}
  }, []);

  async function activateLicense() {
    if (!licForm.name || !licForm.key) { setLicErr("من فضلك أدخل اسم النادي وكود التفعيل"); return; }
    if (!validateKey(licForm.name, licForm.key)) { setLicErr("❌ كود التفعيل غلط — تواصل مع المطور"); return; }
    localStorage.setItem("gym_lic", JSON.stringify(licForm));
    setLicensed(true); setLicErr("");
  }

  function showToast(msg, type = "success") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  // Load saved gym data on first mount
  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("gymInfo", false);
        if (result && result.value) {
          const saved = JSON.parse(result.value);
          if (saved.name && saved.phone) {
            setGymInfo(saved);
            setSetupDone(true);
          }
        }
      } catch (err) {}

      try {
        const m = await window.storage.get("members", false);
        if (m && m.value) setMembers(JSON.parse(m.value));
      } catch (err) {}

      try {
        const t = await window.storage.get("trainers", false);
        if (t && t.value) setTrainers(JSON.parse(t.value));
      } catch (err) {}

      try {
        const p = await window.storage.get("plans", false);
        if (p && p.value) setPlans(JSON.parse(p.value));
      } catch (err) {}

      try {
        const sp = await window.storage.get("supplements", false);
        if (sp && sp.value) setSupplements(JSON.parse(sp.value));
      } catch (err) {}

      try {
        const ex = await window.storage.get("expenses", false);
        if (ex && ex.value) setExpenses(JSON.parse(ex.value));
      } catch (err) {}

      setLoadingSetup(false);
    })();
  }, []);

  // Save members/trainers/plans whenever they change (after initial load)
  useEffect(() => {
    if (loadingSetup) return;
    window.storage.set("members", JSON.stringify(members), false).catch(() => {});
  }, [members, loadingSetup]);

  useEffect(() => {
    if (loadingSetup) return;
    window.storage.set("trainers", JSON.stringify(trainers), false).catch(() => {});
  }, [trainers, loadingSetup]);

  useEffect(() => {
    if (loadingSetup) return;
    window.storage.set("plans", JSON.stringify(plans), false).catch(() => {});
  }, [plans, loadingSetup]);

  useEffect(() => {
    if (loadingSetup) return;
    window.storage.set("supplements", JSON.stringify(supplements), false).catch(() => {});
  }, [supplements, loadingSetup]);

  useEffect(() => {
    if (loadingSetup) return;
    window.storage.set("expenses", JSON.stringify(expenses), false).catch(() => {});
  }, [expenses, loadingSetup]);

  // On load: for every recurring expense, make sure an entry exists for the current month
  useEffect(() => {
    if (loadingSetup) return;
    const thisMonth = new Date().toISOString().slice(0, 7); // "YYYY-MM"
    setExpenses(prev => {
      const recurringTemplates = prev.filter(e => e.recurring);
      const seenNames = new Set();
      const additions = [];
      recurringTemplates.forEach(tpl => {
        if (seenNames.has(tpl.name)) return;
        seenNames.add(tpl.name);
        const existsThisMonth = prev.some(e => e.name === tpl.name && e.recurring && e.month === thisMonth);
        if (!existsThisMonth) {
          additions.push({ id: Date.now() + Math.random(), name: tpl.name, amount: tpl.amount, recurring: true, month: thisMonth });
        }
      });
      return additions.length ? [...prev, ...additions] : prev;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loadingSetup]);

  // Show expired-subscription alert once when the app first loads (if any)
  useEffect(() => {
    if (loadingSetup) return;
    const hasExpired = members.some(m => daysLeft(m.startDate, m.plan, plans) <= 0);
    if (hasExpired) setShowExpiryAlert(true);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loadingSetup]);


  async function completeSetup() {
    if (!setupForm.name || !setupForm.phone) return showToast("من فضلك أدخل اسم النادي ورقم التليفون", "error");
    setGymInfo(setupForm);
    setSetupDone(true);
    try {
      await window.storage.set("gymInfo", JSON.stringify(setupForm), false);
    } catch (err) {
      showToast("تم الحفظ مؤقتاً فقط (تعذر الحفظ الدائم)", "error");
    }
  }

  async function saveGymInfo() {
    if (!settingsForm.name || !settingsForm.phone) return showToast("من فضلك أدخل اسم النادي ورقم التليفون", "error");
    setGymInfo(settingsForm);
    try {
      await window.storage.set("gymInfo", JSON.stringify(settingsForm), false);
      showToast("تم تحديث بيانات النادي ✓");
    } catch (err) {
      showToast("تعذر الحفظ الدائم", "error");
    }
    setShowSettings(false);
  }

  function addMember() {
    if (!form.name || !form.phone) return showToast("من فضلك أدخل الاسم والتليفون", "error");
    if (editMember) {
      setMembers(ms => ms.map(m => m.id === editMember.id
        ? { ...m, ...form, weight: +form.weight, height: +form.height } : m));
      showToast("تم تعديل بيانات العضو ✓");
      setEditMember(null);
    } else {
      const newM = { ...form, id: Date.now(), sessions: 0, weight: +form.weight, height: +form.height };
      setMembers(ms => [...ms, newM]);
      showToast("تم إضافة العضو بنجاح ✓");
    }
    setForm({ name: "", phone: "", plan: Object.keys(plans)[0], startDate: new Date().toISOString().split("T")[0], paid: true, weight: "", height: "" });
    setShowAdd(false);
  }

  function deleteMember(id) {
    setMembers(ms => ms.filter(m => m.id !== id));
    showToast("تم حذف العضو", "error");
  }

  function togglePaid(id) {
    setMembers(ms => ms.map(m => m.id === id ? { ...m, paid: !m.paid } : m));
  }

  function openEdit(m) {
    setEditMember(m);
    setForm({ name: m.name, phone: m.phone, plan: m.plan, startDate: m.startDate, paid: m.paid, weight: m.weight, height: m.height });
    setShowAdd(true);
  }

  function saveOffer() {
    if (!offerForm.name || !offerForm.price || !offerForm.days) return showToast("من فضلك املأ كل البيانات", "error");
    setPlans(p => {
      const updated = { ...p };
      if (editingOffer && editingOffer !== offerForm.name) delete updated[editingOffer];
      updated[offerForm.name] = { price: +offerForm.price, days: +offerForm.days };
      return updated;
    });
    showToast(editingOffer ? "تم تعديل العرض ✓" : "تم إضافة العرض ✓");
    setOfferForm({ name: "", price: "", days: "" });
    setEditingOffer(null);
    setShowOffer(false);
  }

  function deleteOffer(name) {
    if (Object.keys(plans).length <= 1) return showToast("لازم يفضل عرض واحد على الأقل", "error");
    setPlans(p => {
      const updated = { ...p };
      delete updated[name];
      return updated;
    });
    showToast("تم حذف العرض", "error");
  }

  function openEditOffer(name) {
    setEditingOffer(name);
    setOfferForm({ name, price: plans[name].price, days: plans[name].days });
    setShowOffer(true);
  }

  function saveExpense() {
    if (!expenseForm.name || !expenseForm.amount) return showToast("من فضلك أدخل اسم المصروف والمبلغ", "error");
    const thisMonth = new Date().toISOString().slice(0, 7);
    if (editingExpense) {
      setExpenses(ex => ex.map(e => e.id === editingExpense.id
        ? { ...e, name: expenseForm.name, amount: +expenseForm.amount, recurring: expenseForm.recurring }
        : e));
      showToast("تم تعديل المصروف ✓");
    } else {
      setExpenses(ex => [...ex, {
        id: Date.now(),
        name: expenseForm.name,
        amount: +expenseForm.amount,
        recurring: expenseForm.recurring,
        month: thisMonth,
      }]);
      showToast("تم إضافة المصروف ✓");
    }
    setExpenseForm({ name: "", amount: "", recurring: false });
    setEditingExpense(null);
    setShowExpense(false);
  }

  function deleteExpense(id) {
    setExpenses(ex => ex.filter(e => e.id !== id));
    showToast("تم حذف المصروف", "error");
  }

  function openEditExpense(e) {
    setEditingExpense(e);
    setExpenseForm({ name: e.name, amount: e.amount, recurring: e.recurring });
    setShowExpense(true);
  }

  function addTrainer() {
    if (!trainerForm.name || !trainerForm.phone) return showToast("من فضلك أدخل الاسم والتليفون", "error");
    const thisMonth = new Date().toISOString().slice(0, 7);
    if (editTrainer) {
      setTrainers(ts => ts.map(t => t.id === editTrainer.id ? { ...t, ...trainerForm } : t));
      if (trainerForm.salary) {
        const expName = "راتب " + trainerForm.name;
        setExpenses(ex => {
          const exists = ex.find(e => e.name === expName && e.recurring);
          if (exists) return ex.map(e => e.name === expName ? { ...e, amount: +trainerForm.salary } : e);
          return [...ex, { id: Date.now(), name: expName, amount: +trainerForm.salary, recurring: true, month: thisMonth }];
        });
      }
      showToast("تم تعديل بيانات الكوتش ✓");
      setEditTrainer(null);
    } else {
      setTrainers(ts => [...ts, { ...trainerForm, id: Date.now() }]);
      if (trainerForm.salary) {
        setExpenses(ex => [...ex, { id: Date.now()+1, name: "راتب " + trainerForm.name, amount: +trainerForm.salary, recurring: true, month: thisMonth }]);
      }
      showToast("تم إضافة الكوتش وراتبه في المصروفات ✓");
    }
    setTrainerForm({ name: "", phone: "", specialty: "", shift: "صباحي", salary: "" });
    setShowTrainer(false);
  }

  function saveSupp() {
    if (!suppForm.name || !suppForm.price) return showToast("من فضلك أدخل اسم الإضافة والسعر", "error");
    if (editSupp) {
      setSupplements(ss => ss.map(s => s.id === editSupp.id ? { ...s, name: suppForm.name, price: +suppForm.price } : s));

            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24, padding: "12px 14px", background: "#1a1a24", borderRadius: 10 }}>
              <input type="checkbox" id="recurring" checked={expenseForm.recurring} onChange={e => setExpenseForm(f => ({ ...f, recurring: e.target.checked }))} style={{ width: 18, height: 18, cursor: "pointer" }} />
              <label htmlFor="recurring" style={{ cursor: "pointer", fontSize: 14 }}>
                مصروف شهري ثابت (يُضاف تلقائياً كل شهر — مثل الكهرباء والإيجار)
              </label>
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button style={{ ...styles.btn("primary"), flex: 1, justifyContent: "center" }} onClick={saveExpense}>
                {editingExpense ? "حفظ التعديلات" : "إضافة المصروف"}
              </button>
              <button style={{ ...styles.btn("ghost"), flex: 1, justifyContent: "center" }} onClick={() => setShowExpense(false)}>
                إلغاء
              </button>
            </div>
          </div>
        </div>
      )}

      {showTrainer && (
        <div style={styles.modal} onClick={e => e.target === e.currentTarget && setShowTrainer(false)}>
          <div style={{ ...styles.modalBox, width: 420 }}>
            <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 24 }}>
              {editTrainer ? "✏️ تعديل بيانات الكوتش" : "➕ إضافة كوتش جديد"}
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={styles.label}>الاسم الكامل *</label>
              <input style={styles.input} placeholder="مثال: كوتش أحمد سامي" value={trainerForm.name}
                onChange={e => setTrainerForm(f => ({ ...f, name: e.target.value }))} />
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={styles.label}>رقم التليفون *</label>
              <input style={styles.input} placeholder="01xxxxxxxxx" value={trainerForm.phone}
                onChange={e => setTrainerForm(f => ({ ...f, phone: e.target.value }))} />
            </div>
            <div style={styles.row}>
              <div style={{ flex: 1 }}>
                <label style={styles.label}>التخصص</label>
                <input style={styles.input} placeholder="مثال: كمال أجسام" value={trainerForm.specialty}
                  onChange={e => setTrainerForm(f => ({ ...f, specialty: e.target.value }))} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={styles.label}>الفترة</label>
                <select style={styles.input} value={trainerForm.shift} onChange={e => setTrainerForm(f => ({ ...f, shift: e.target.value }))}>
                  <option value="صباحي">صباحي</option>
                  <option value="مسائي">مسائي</option>
                </select>
              </div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={styles.label}>الراتب الشهري (ج.م) — يُضاف تلقائياً للمصروفات</label>
              <input style={styles.input} type="number" placeholder="3000" value={trainerForm.salary}
                onChange={e => setTrainerForm(f => ({ ...f, salary: e.target.value }))} />
            </div>
            <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
              <button style={{ ...styles.btn("primary"), flex: 1, justifyContent: "center" }} onClick={addTrainer}>
                {editTrainer ? "حفظ التعديلات" : "إضافة الكوتش"}
              </button>
              <button style={{ ...styles.btn("ghost"), flex: 1, justifyContent: "center" }} onClick={() => setShowTrainer(false)}>
                إلغاء
              </button>
            </div>
          </div>
        </div>
      )}

      {showSettings && (
        <div style={styles.modal} onClick={e => e.target === e.currentTarget && setShowSettings(false)}>
          <div style={{ ...styles.modalBox, width: 400 }}>
            <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 24 }}>⚙️ تعديل بيانات النادي</div>
            <div style={{ marginBottom: 16 }}>
              <label style={styles.label}>اسم النادي *</label>
              <input style={styles.input} placeholder="مثال: نادي القوة" value={settingsForm.name}
                onChange={e => setSettingsForm(f => ({ ...f, name: e.target.value }))} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <label style={styles.label}>رقم تليفون النادي *</label>
              <input style={styles.input} placeholder="01xxxxxxxxx" value={settingsForm.phone}
                onChange={e => setSettingsForm(f => ({ ...f, phone: e.target.value }))} />
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button style={{ ...styles.btn("primary"), flex: 1, justifyContent: "center" }} onClick={saveGymInfo}>
                حفظ التعديلات
              </button>
              <button style={{ ...styles.btn("ghost"), flex: 1, justifyContent: "center" }} onClick={() => setShowSettings(false)}>
                إلغاء
              </button>
            </div>
          </div>
        </div>
      )}

      {showExpiryAlert && expiredMembers.length > 0 && (
        <div style={styles.modal} onClick={e => e.target === e.currentTarget && setShowExpiryAlert(false)}>
          <div style={{ ...styles.modalBox, width: 440, borderColor: "#ef444450" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
              <Icon name="alert" size={26} color="#ef4444" />
              <div style={{ fontSize: 20, fontWeight: 800, color: "#ef4444" }}>تنبيه: اشتراكات منتهية</div>
            </div>
            <div style={{ color: "#888", fontSize: 14, marginBottom: 16 }}>
              يوجد {expiredMembers.length} عضو انتهى اشتراكهم:
            </div>
            <div style={{ maxHeight: 260, overflowY: "auto", marginBottom: 20 }}>
              {expiredMembers.map(m => {
                const days = Math.abs(daysLeft(m.startDate, m.plan, plans));
                return (
                  <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "#ef444411", border: "1px solid #ef444430", borderRadius: 10, marginBottom: 8 }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{m.name}</div>
                      <div style={{ fontSize: 12, color: "#888" }}>انتهى منذ {days === 0 ? "اليوم" : days + " يوم"} ({expiryDate(m.startDate, m.plan, plans)})</div>
                    </div>
                    <span style={styles.badge("#ef4444")}>منتهي</span>
                  </div>
                );
              })}
            </div>
            <button style={{ ...styles.btn("primary"), width: "100%", justifyContent: "center" }} onClick={() => setShowExpiryAlert(false)}>
              تم، فهمت
            </button>
          </div>
        </div>
      )}

      {showSupp && (
        <div style={styles.modal} onClick={e => e.target === e.currentTarget && setShowSupp(false)}>
          <div style={{ ...styles.modalBox, width: 400 }}>
            <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 24 }}>
              {editSupp ? "✏️ تعديل الإضافة" : "🛍️ إضافة منتج جديد"}
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={styles.label}>اسم الإضافة / المكمل *</label>
              <input style={styles.input} placeholder="مثال: بروتين، كرياتين، أوميغا" value={suppForm.name}
                onChange={e => setSuppForm(f => ({ ...f, name: e.target.value }))} />
            </div>
            <div style={{ marginBottom: 24 }}>
              <label style={styles.label}>السعر (ج.م) *</label>
              <input style={styles.input} type="number" placeholder="250" value={suppForm.price}
                onChange={e => setSuppForm(f => ({ ...f, price: e.target.value }))} />
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button style={{ ...styles.btn("primary"), flex: 1, justifyContent: "center" }} onClick={saveSupp}>
                {editSupp ? "حفظ التعديلات" : "إضافة المنتج"}
              </button>
              <button style={{ ...styles.btn("ghost"), flex: 1, justifyContent: "center" }} onClick={() => setShowSupp(false)}>
                إلغاء
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={styles.toast(toast.type)}>{toast.msg}</div>}
    </div>
  );
}

// ─── Mount ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GymApp />);

  </script>
</body>
</html>
